services:
  - type: web
    name: stegochain-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --workers 2 --worker-class sync --timeout 120 --max-requests 100 --max-requests-jitter 10 --bind 0.0.0.0:$PORT 'app:create_app()'"
    healthCheckPath: /health
