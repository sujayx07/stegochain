version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stegochain_backend
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stegochain_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
