version: "3.9"

services:

  mongo:
    image: mongo:7.0
    container_name: stegochain_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ganache:
    image: trufflesuite/ganache:latest
    container_name: stegochain_ganache
    ports:
      - "7545:7545"
    command: >
      --port 7545
      --chainId 1337
      --accounts 10
      --deterministic
      --mnemonic "test test test test test test test test test test test junk"
      --gasLimit 12000000
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:7545',
             r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  deploy_contract:
    image: node:18-alpine
    container_name: stegochain_deploy
    working_dir: /app/blockchain
    volumes:
      - ./blockchain:/app/blockchain
      - ./scripts:/app/scripts
      - contract_artifacts:/app/blockchain/artifacts
    environment:
      - GANACHE_URL=http://ganache:7545
      - PRIVATE_KEY=${PRIVATE_KEY}
    command: >
      sh -c "
        npm install &&
        npx hardhat compile &&
        npx hardhat run scripts/deploy.js --network ganache &&
        echo CONTRACT_DEPLOYED
      "
    depends_on:
      ganache:
        condition: service_healthy
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stegochain_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
      - MONGO_URI=mongodb://mongo:27017/stegochain
      - GANACHE_URL=http://ganache:7545
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET_KEY=${PINATA_SECRET_KEY}
      - PINATA_BASE_URL=https://api.pinata.cloud
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - contract_artifacts:/app/blockchain/artifacts
    depends_on:
      mongo:
        condition: service_healthy
      ganache:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stegochain_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
  contract_artifacts:
